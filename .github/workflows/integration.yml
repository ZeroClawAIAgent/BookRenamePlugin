name: integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build plugin
        run: ./gradlew build --no-daemon

      - name: Cache server jars
        uses: actions/cache@v4
        with:
          path: server-jars
          key: server-jars-26.1.2-via-5.9.1

      - name: Download Paper 26.1.2 (latest build)
        run: |
          mkdir -p server-jars
          BUILD=$(curl -fsSL 'https://api.papermc.io/v2/projects/paper/versions/26.1.2' \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['builds'][-1])")
          echo "Using Paper build #$BUILD"
          curl -fsSL -o server-jars/paper.jar \
            "https://api.papermc.io/v2/projects/paper/versions/26.1.2/builds/${BUILD}/downloads/paper-${BUILD}.jar"
          ls -la server-jars

      - name: Download ViaVersion 5.9.1 + ViaBackwards 5.9.1
        run: |
          curl -fsSL -o server-jars/ViaVersion-5.9.1.jar \
            https://github.com/ViaVersion/ViaVersion/releases/download/5.9.1/ViaVersion-5.9.1.jar
          curl -fsSL -o server-jars/ViaBackwards-5.9.1.jar \
            https://github.com/ViaVersion/ViaBackwards/releases/download/5.9.1/ViaBackwards-5.9.1.jar

      - name: Prepare server directory
        run: |
          mkdir -p server && cd server
          cp -v ../server-jars/paper.jar paper.jar
          mkdir -p plugins
          cp -v ../build/libs/BookRename-*.jar plugins/BookRename.jar
          cp -v ../server-jars/ViaVersion-5.9.1.jar plugins/ViaVersion.jar
          cp -v ../server-jars/ViaBackwards-5.9.1.jar plugins/ViaBackwards.jar

      - name: Accept EULA
        run: echo "eula=true" > server/eula.txt

      - name: Server config (offline mode, port 25565)
        run: |
          cat > server/server.properties <<'EOF'
          server-port=25565
          online-mode=false
          white-list=false
          motd=BookRename CI
          max-players=10
          view-distance=4
          simulation-distance=4
          spawn-protection=0
          EOF

      - name: Start Paper server (background)
        run: |
          cd server
          nohup java -Xms512M -Xmx2G -jar paper.jar --nogui > ../server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server ready
        run: |
          for i in $(seq 1 90); do
            if grep -q "Done" server.log 2>/dev/null; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start in 90s"
          tail -n 200 server.log
          kill $(cat server/server.pid) 2>/dev/null || true
          exit 1

      - name: Install mineflayer deps
        working-directory: tests/mineflayer
        run: npm ci

      - name: Run mineflayer rename test (1.21.11 client -> 26.1.2 server)
        working-directory: tests/mineflayer
        run: |
          set -e
          node test-rename.js
        env:
          MC_HOST: 127.0.0.1
          MC_PORT: '25565'

      - name: Dump server log on failure
        if: failure()
        run: |
          tail -n 400 server.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f server/server.pid ]; then
            kill $(cat server/server.pid) 2>/dev/null || true
          fi
          pkill -f paper.jar || true
